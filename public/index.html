<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paint House · Multiplayer</title>
<link rel="stylesheet" href="style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Top HUD -->
  <div id="hud" class="hud">
    <div id="timer" class="timer">--</div>
    <div id="scoreboard" class="scoreboard"></div>
  </div>

  <!-- Crosshair -->
  <div id="crosshair" class="crosshair">
    <div class="dot"></div>
  </div>

  <!-- Lobby / Menu overlay -->
  <div id="overlay" class="overlay">
    <div class="panel">
      <h1>Paint House</h1>
      <p class="sub">Multiplayer · Paint the floor · Claim your territory</p>
      <div class="row">
        <label>Name</label>
        <input id="name" maxlength="16" placeholder="Pick a name">
      </div>
      <div id="players" class="players"></div>
      <div id="status" class="status">Connecting…</div>
      <button id="startBtn" class="primary" disabled>Start Game</button>
      <div class="hint">
        <b>W / S</b> Forward / Back ·
        <b>A / D</b> Rotate camera ·
        <b>Mouse</b> Aim ·
        <b>Left click / Space</b> Paint
      </div>
    </div>
  </div>

  <!-- Result overlay -->
  <div id="result" class="overlay hidden">
    <div class="panel">
      <h1 id="resultTitle">Result</h1>
      <div id="ranking" class="ranking"></div>
      <button id="restartBtn" class="primary">Play Again</button>
    </div>
  </div>

  <!-- Countdown overlay -->
  <div id="countdown" class="countdown hidden"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
